name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint pytest black mypy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        flake8 --count --select=E9,F63,F7,F82 --show-source --statistics src tests run.py
        flake8 --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics src tests run.py
    - name: Lint with pylint
      run: |
        pylint $(git ls-files '*.py')
    - name: Check formatting with black
      run: |
        black --check src/ tests/
    - name: Type check with mypy
      run: |
        mypy src/
    - name: Test with pytest
      run: |
        pytest
